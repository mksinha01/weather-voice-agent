<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Scheme Awareness Voice</title>
  <style>
    body { font-family: system-ui, sans-serif; margin: 0; padding: 24px; background: #0f172a; color: #e2e8f0; }
    .card { max-width: 640px; margin: 0 auto; background: #111827; border: 1px solid #1f2937; border-radius: 12px; padding: 20px; box-shadow: 0 12px 40px rgba(0,0,0,0.35); }
    h1 { margin-top: 0; font-size: 24px; }
    button { cursor: pointer; border: none; border-radius: 8px; padding: 12px 16px; font-size: 15px; font-weight: 600; background: #22c55e; color: #0b1729; }
    button.secondary { background: #1f2937; color: #e2e8f0; border: 1px solid #334155; }
    button:disabled { opacity: 0.6; cursor: not-allowed; }
    .row { display: flex; gap: 12px; align-items: center; margin-top: 12px; flex-wrap: wrap; }
    .pill { display: inline-flex; align-items: center; gap: 6px; padding: 6px 10px; border-radius: 999px; background: #0b1220; border: 1px solid #1f2937; font-size: 13px; }
    .log { background: #0b1220; border: 1px solid #1f2937; border-radius: 8px; padding: 12px; margin-top: 16px; min-height: 100px; font-family: ui-monospace, SFMono-Regular, Consolas, monospace; font-size: 13px; white-space: pre-wrap; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Scheme Awareness Voice</h1>
    <p>Join the voice room, talk with the agent, and hear replies. Audio-only.</p>

    <div class="row">
      <label style="flex:1; display:flex; flex-direction:column; gap:6px; min-width:220px;">
        <span style="font-size:12px; color:#94a3b8;">URL</span>
        <input id="urlInput" style="padding:10px; border-radius:8px; border:1px solid #334155; background:#0b1220; color:#e2e8f0;" placeholder="wss://..." />
      </label>
      <label style="flex:1; display:flex; flex-direction:column; gap:6px; min-width:220px;">
        <span style="font-size:12px; color:#94a3b8;">Token</span>
        <input id="tokenInput" style="padding:10px; border-radius:8px; border:1px solid #334155; background:#0b1220; color:#e2e8f0;" placeholder="Paste token or use auto" />
      </label>
    </div>

    <div class="row" style="margin-top:16px;">
      <button id="connectBtn">Connect</button>
      <button id="micBtn" class="secondary" disabled>Mute</button>
      <span id="status" class="pill">Idle</span>
    </div>

    <div class="log" id="log"></div>
  </div>

  <script type="module">
    import { Room, createLocalAudioTrack, ConnectionState } from "https://esm.sh/livekit-client@1.19.3";

    const logEl = document.getElementById("log");
    const statusEl = document.getElementById("status");
    const connectBtn = document.getElementById("connectBtn");
    const micBtn = document.getElementById("micBtn");
    const urlInput = document.getElementById("urlInput");
    const tokenInput = document.getElementById("tokenInput");

    let room;
    let localTrack;

    function log(msg) {
      const time = new Date().toLocaleTimeString();
      logEl.textContent += `\n[${time}] ${msg}`;
      logEl.scrollTop = logEl.scrollHeight;
    }

    async function fetchToken() {
      const res = await fetch("/token");
      if (!res.ok) throw new Error(`Failed to fetch token (${res.status})`);
      return res.json();
    }

    async function connect() {
      if (room) return;
      setStatus("Connecting...");
      connectBtn.disabled = true;
      try {
        let url = urlInput.value.trim();
        let token = tokenInput.value.trim();

        if (!url || !token) {
          const data = await fetchToken();
          url = data.url;
          token = data.token;
          urlInput.value = url;
          tokenInput.value = token;
          log("Fetched token from server");
        }

        room = new Room({ audioCaptureDefaults: { echoCancellation: true } });
        room.on(ConnectionState.Connected, () => log("Connected"));
        room.on(ConnectionState.Disconnected, () => log("Disconnected"));
        await room.connect(url, token);
        log("Joined room");
        await enableMic();
        micBtn.disabled = false;
        connectBtn.textContent = "Connected";
        setStatus("Live");
      } catch (err) {
        console.error(err);
        log(`Error: ${err?.message || err}`);
        connectBtn.disabled = false;
        setStatus("Error");
      }
    }

    async function enableMic() {
      if (!room) return;
      if (localTrack) return; // already publishing
      localTrack = await createLocalAudioTrack();
      await room.localParticipant.publishTrack(localTrack);
      micBtn.textContent = "Mute";
      log("Mic on");
    }

    async function toggleMic() {
      if (!room || !localTrack) return;
      const enabled = localTrack.isEnabled;
      if (enabled) {
        localTrack.setEnabled(false);
        micBtn.textContent = "Unmute";
        log("Mic muted");
      } else {
        localTrack.setEnabled(true);
        micBtn.textContent = "Mute";
        log("Mic unmuted");
      }
    }

    function setStatus(text) {
      statusEl.textContent = text;
    }

    connectBtn.addEventListener("click", connect);
    micBtn.addEventListener("click", toggleMic);
  </script>
</body>
</html>
